<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Nutanix</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #111;
  font-family: Arial, sans-serif;
}

/* FULL SCREEN OVERLAY */
.viewer {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  background: #111;
  overflow: hidden;
  cursor: grab;
}

.viewer:active {
  cursor: grabbing;
}

#img {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: center center;
  user-select: none;
  will-change: transform;
  max-width: none;
}

/* UI hint */
.hint {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="viewer" id="viewer">
  <img
    id="img"
    src="https://raw.githubusercontent.com/NuttyRyan/UCISA/main/BX3101%20-%20Nutanix%20AO%20Solutions%20Poster(VF-screen).jpg"
  />
  <div class="hint">Scroll to zoom • Drag to pan • Double click reset</div>
</div>

<script>
const viewer = document.getElementById("viewer");
const img = document.getElementById("img");

let scale = 1;
let baseScale = 1;
let x = 0;
let y = 0;

let dragging = false;
let startX, startY;

/* FIT TO SCREEN */
function fit() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const iw = img.naturalWidth;
  const ih = img.naturalHeight;

  const scaleX = vw / iw;
  const scaleY = vh / ih;

  baseScale = Math.min(scaleX, scaleY);

  scale = baseScale;
  x = 0;
  y = 0;

  update();
}

/* APPLY TRANSFORM */
function update() {
  img.style.transform =
    `translate(-50%, -50%) translate(${x}px, ${y}px) scale(${scale})`;
}

/* ZOOM */
viewer.addEventListener("wheel", (e) => {
  e.preventDefault();

  const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
  const newScale = Math.min(Math.max(scale * zoomFactor, baseScale * 0.5), baseScale * 8);

  scale = newScale;
  update();
}, { passive: false });

/* PAN */
viewer.addEventListener("mousedown", (e) => {
  dragging = true;
  startX = e.clientX - x;
  startY = e.clientY - y;
});

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  x = e.clientX - startX;
  y = e.clientY - startY;
  update();
});

window.addEventListener("mouseup", () => {
  dragging = false;
});

/* RESET */
viewer.addEventListener("dblclick", () => {
  scale = baseScale;
  x = 0;
  y = 0;
  update();
});

/* LOAD */
if (img.complete) {
  fit();
} else {
  img.onload = fit;
}

/* RESIZE SAFE */
window.addEventListener("resize", fit);

update();
</script>

</body>
</html>
