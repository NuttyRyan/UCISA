<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fullscreen Poster Viewer</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #111;
  font-family: Arial, sans-serif;
}

/* Start screen */
#startScreen {
  position: fixed;
  inset: 0;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  flex-direction: column;
  cursor: pointer;
  text-align: center;
}

#startScreen h1 {
  font-size: 22px;
  margin-bottom: 10px;
  font-weight: normal;
  opacity: 0.9;
}

#startScreen p {
  opacity: 0.7;
  font-size: 14px;
}

/* Viewer */
.viewer {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  position: relative;
  cursor: grab;
}

.viewer:active {
  cursor: grabbing;
}

#img {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: center center;
  user-select: none;
  will-change: transform;
  max-width: none;
}

.hint {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
}
</style>
</head>

<body>

<!-- Start Screen -->
<div id="startScreen">
  <h1>Click to Enter Fullscreen Viewer</h1>
  <p>Then use scroll to zoom • drag to pan</p>
</div>

<!-- Viewer -->
<div class="viewer" id="viewer" style="display:none;">
  <img
    id="img"
    src="https://raw.githubusercontent.com/NuttyRyan/UCISA/main/BX3101%20-%20Nutanix%20AO%20Solutions%20Poster(VF-screen).jpg"
  />
  <div class="hint">Scroll to zoom • Drag to pan • Double click to reset</div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const viewer = document.getElementById("viewer");
const img = document.getElementById("img");

let scale = 1;
let x = 0;
let y = 0;

let isDragging = false;
let startX, startY;

function update() {
  img.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}

/* FULLSCREEN ENTRY */
startScreen.addEventListener("click", async () => {
  try {
    await document.documentElement.requestFullscreen();
  } catch (e) {
    console.log("Fullscreen failed:", e);
  }

  startScreen.style.display = "none";
  viewer.style.display = "block";
});

/* ZOOM */
viewer.addEventListener("wheel", (e) => {
  e.preventDefault();

  const rect = img.getBoundingClientRect();

  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
  const newScale = Math.min(Math.max(scale * zoomFactor, 0.5), 8);

  x -= (mouseX - rect.width / 2) * (newScale / scale - 1);
  y -= (mouseY - rect.height / 2) * (newScale / scale - 1);

  scale = newScale;
  update();
}, { passive: false });

/* PAN */
viewer.addEventListener("mousedown", (e) => {
  isDragging = true;
  startX = e.clientX - x;
  startY = e.clientY - y;
});

window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  x = e.clientX - startX;
  y = e.clientY - startY;
  update();
});

window.addEventListener("mouseup", () => {
  isDragging = false;
});

/* RESET */
viewer.addEventListener("dblclick", () => {
  scale = 1;
  x = 0;
  y = 0;
  update();
});

update();
</script>

</body>
</html>
